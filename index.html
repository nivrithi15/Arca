<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eco-Media Calculator</title>
  <meta name="description"
    content="Upload an image and see Cloudinary's automatic optimization for a greener media footprint." />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Cloudinary Upload Widget -->
  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
</head>

<body>
  <header id="header">
    <h1>Eco-Media Calculator</h1>
  </header>
  <main>
    <section class="upload-section">
      <button id="uploadBtn">Upload Image</button>
    </section>
    <section id="results" class="results-section hidden">
  <h2>Comparison</h2>
  <div class="images-wrapper">
    <div class="card image-box">
      <h3>Original</h3>
      <img id="originalImg" src="" alt="Original upload" />
    </div>
    <div class="card image-box">
      <h3>Optimized</h3>
      <img id="optimizedImg" src="" alt="Optimized version" />
    </div>
  </div>
  <div id="metrics" class="impact-box hidden">
    <h3>Sustainability Impact</h3>
    <div class="carbon-counter">
      <span class="label">Carbon Saved (g):</span>
      <span class="value" id="carbonSaved">-</span>
    </div>
    <p class="footer">Data optimization reduces server energy consumption and bandwidth, lowering your digital carbon footprint.</p>
  </div>
</section>
  </main>

  <script src="app.js"></script>
</body>

</html>
