<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arca</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>
<header>
    <h1>Arca</h1>
    <p>Digitalize your wardrobe. Prevent fashion waste.</p>
</header>

<main>
    <div class="total-impact">
        <h2>Total Closet Impact</h2>
        <div class="stat-circle">
            <span id="total-co2">0.0</span>
            <small>kg</small>
        </div>
    </div>

    <div class="controls">
        <select id="category-select" class="folder-select">
            <option value="casuals">Casuals</option>
            <option value="dresses">Dresses</option>
            <option value="pants">Pants</option>
            <option value="tops">Tops</option>
            <option value="home">Home Wear</option>
        </select>
        <button id="upload_widget" class="cloudinary-button">Add Item</button>
    </div>

    <div id="wardrobe-grid" class="grid">
        </div>
</main>
    <script src="script.js"></script>
</body>
</html>
